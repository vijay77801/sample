<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cezo Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f2f2f2;
    overflow-x:hidden;
}

/* Splash */

.splash{
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:1000;
    animation:hideSplash 1s forwards;
    animation-delay:3s;
}

.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#ff9800;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:45px;
    font-weight:bold;
    animation:zoom 2s infinite;
}

.name{
    color:white;
    font-size:34px;
    margin-top:20px;
}

.loading{
    width:220px;
    height:8px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
    margin-top:20px;
}

.loading span{
    display:block;
    width:0%;
    height:100%;
    background:#ff9800;
    animation:load 3s linear forwards;
}

/* Main */

.main{
    display:none;
    padding:15px;
}

.header{
    background:black;
    color:white;
    padding:18px;
    border-radius:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

#reader{
    width:100%;
    margin-top:20px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    padding:10px;
}

.scan-btn{
    width:100%;
    padding:15px;
    border:none;
    background:#ff9800;
    color:white;
    border-radius:12px;
    font-size:20px;
    margin-top:15px;
}

.status{
    text-align:center;
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}

.card{
    background:white;
    margin-top:20px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:180px;
    object-fit:contain;
}

.card h2{
    margin-top:10px;
}

.card p{
    margin-top:8px;
    font-size:18px;
}

.total{
    margin-top:20px;
    background:green;
    color:white;
    padding:18px;
    border-radius:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

/* Animation */

@keyframes zoom{

    50%{
        transform:scale(1.2);
    }

}

@keyframes load{

    100%{
        width:100%;
    }

}

@keyframes hideSplash{

    to{
        opacity:0;
        visibility:hidden;
    }

}

</style>
</head>
<body>

<!-- Splash -->

<div class="splash">

    <div class="logo">
        C
    </div>

    <div class="name">
        CEZO SCANNER
    </div>

    <div class="loading">
        <span></span>
    </div>

</div>

<!-- Main -->

<div class="main" id="main">

    <div class="header">
        CEZO SCANNER
    </div>

    <div id="reader"></div>

    <button class="scan-btn" onclick="startScanner()">
        Open Back Camera Scanner
    </button>

    <div class="status" id="status">
        Click Camera To Scan Products
    </div>

    <div id="products"></div>

    <div class="total">
        Grand Total : ₹ <span id="grand">0</span>
    </div>

</div>

<script>

/* Splash */

setTimeout(function(){

    document.getElementById("main").style.display = "block";

},3000);

/* Variables */

let total = 0;
let scanned = [];
let scannerStarted = false;
let html5QrCode;

/* Demo Product Database */

const products = {

    "8901030895488":{
        name:"Maggi Noodles",
        price:20,
        image:"https://m.media-amazon.com/images/I/81XQ5znwK-L.jpg"
    },

    "8901491101831":{
        name:"Coca Cola",
        price:40,
        image:"https://m.media-amazon.com/images/I/61X0ISBpD-L.jpg"
    },

    "8906009459621":{
        name:"Dairy Milk Chocolate",
        price:50,
        image:"https://m.media-amazon.com/images/I/71oA6zL3n4L.jpg"
    },

    "8902519012333":{
        name:"Parle G Biscuits",
        price:10,
        image:"https://m.media-amazon.com/images/I/71D4AL7Y0oL.jpg"
    },

    "8901063010413":{
        name:"Lays Chips",
        price:20,
        image:"https://m.media-amazon.com/images/I/71M8MUt0mlL.jpg"
    }

};

/* Start Scanner */

async function startScanner(){

    if(scannerStarted){
        return;
    }

    scannerStarted = true;

    html5QrCode =
    new Html5Qrcode("reader");

    try{

        await html5QrCode.start(

            {
                facingMode:"environment"
            },

            {
                fps:10,
                qrbox:250
            },

            async function(code){

                if(scanned.includes(code)){
                    return;
                }

                scanned.push(code);

                document.getElementById("status").innerHTML =
                "Scanning Product...";

                let product = products[code];

                /* If Barcode Exists */

                if(product){

                    let quantity = 1;

                    let final =
                    product.price * quantity;

                    total += final;

                    document.getElementById("grand").innerHTML =
                    total;

                    document.getElementById("products").innerHTML += `

                    <div class="card">

                        <img src="${product.image}">

                        <h2>${product.name}</h2>

                        <p><b>Barcode :</b> ${code}</p>

                        <p><b>Price :</b> ₹ ${product.price}</p>

                        <p><b>Quantity :</b> ${quantity}</p>

                        <p><b>Total :</b> ₹ ${final}</p>

                    </div>

                    `;

                    document.getElementById("status").innerHTML =
                    product.name + " Added Successfully";

                }else{

                    /* Unknown Product */

                    let randomPrice =
                    Math.floor(Math.random()*500)+20;

                    total += randomPrice;

                    document.getElementById("grand").innerHTML =
                    total;

                    document.getElementById("products").innerHTML += `

                    <div class="card">

                        <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">

                        <h2>Super Market Product</h2>

                        <p><b>Barcode :</b> ${code}</p>

                        <p><b>Price :</b> ₹ ${randomPrice}</p>

                        <p><b>Quantity :</b> 1</p>

                        <p><b>Total :</b> ₹ ${randomPrice}</p>

                    </div>

                    `;

                    document.getElementById("status").innerHTML =
                    "Product Added Successfully";

                }

            }

        );

    }catch(error){

        document.getElementById("status").innerHTML =
        "Please Allow Camera Permission";

    }

}

</script>

</body>
</html>
