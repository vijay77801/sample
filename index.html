<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cezo Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f2f2f2;
    padding:15px;
}

.header{
    background:black;
    color:white;
    text-align:center;
    padding:18px;
    border-radius:15px;
    font-size:28px;
    font-weight:bold;
}

#reader{
    width:100%;
    margin-top:20px;
    background:white;
    padding:10px;
    border-radius:15px;
}

.scan-btn{
    width:100%;
    padding:15px;
    border:none;
    background:#ff9800;
    color:white;
    border-radius:12px;
    font-size:20px;
    margin-top:15px;
}

.status{
    text-align:center;
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}

.card{
    background:white;
    margin-top:20px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:200px;
    object-fit:contain;
}

.card h2{
    margin-top:10px;
}

.card p{
    margin-top:8px;
    font-size:18px;
}

</style>
</head>
<body>

<div class="header">
    CEZO SCANNER
</div>

<div id="reader"></div>

<button class="scan-btn" onclick="startScanner()">
    Open Back Camera Scanner
</button>

<div class="status" id="status">
    Scan Product Barcode
</div>

<div id="products"></div>

<script>

let scanned = [];

function startScanner(){

    const html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras().then(devices => {

        let backCamera = devices.find(device =>
            device.label.toLowerCase().includes("back")
        );

        let cameraId =
        backCamera ? backCamera.id : devices[0].id;

        html5QrCode.start(

            cameraId,

            {
                fps:10,
                qrbox:250
            },

            async function(code){

                if(scanned.includes(code)){
                    return;
                }

                scanned.push(code);

                document.getElementById("status").innerHTML =
                "Searching Exact Product...";

                try{

                    /* REAL PRODUCT DATABASE */

                    let response =
                    await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json`);

                    let data =
                    await response.json();

                    let productName =
                    data.product?.product_name;

                    let brand =
                    data.product?.brands;

                    let image =
                    data.product?.image_front_url;

                    if(!productName){

                        productName = "Exact Product Not Found";

                    }

                    if(!brand){

                        brand = "Unknown Brand";

                    }

                    if(!image){

                        image =
                        "https://cdn-icons-png.flaticon.com/512/3081/3081559.png";

                    }

                    document.getElementById("products").innerHTML += `

                    <div class="card">

                        <img src="${image}">

                        <h2>${productName}</h2>

                        <p><b>Brand :</b> ${brand}</p>

                        <p><b>Barcode :</b> ${code}</p>

                    </div>

                    `;

                    document.getElementById("status").innerHTML =
                    productName;

                }catch(error){

                    document.getElementById("status").innerHTML =
                    "Internet Error";

                }

            }

        );

    });

}

</script>

</body>
</html>
