<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Advanced Signup Form</title>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:linear-gradient(135deg,#4facfe,#00f2fe);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:420px;
      background:#fff;
      padding:30px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    .input-box{
      margin-bottom:15px;
    }

    .input-box label{
      display:block;
      margin-bottom:5px;
      font-weight:bold;
      color:#444;
    }

    .input-box input,
    .input-box textarea{
      width:100%;
      padding:10px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
      outline:none;
    }

    .input-box input:focus,
    .input-box textarea:focus{
      border-color:#4facfe;
    }

    textarea{
      resize:none;
      height:80px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#4facfe;
      color:white;
      font-size:18px;
      cursor:pointer;
    }

    button:hover{
      background:#00c6fb;
    }

    #message{
      margin-top:15px;
      text-align:center;
      font-weight:bold;
    }

  </style>

</head>
<body>

  <div class="container">

    <h2>User Signup Form</h2>

    <div class="input-box">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Enter full name">
    </div>

    <div class="input-box">
      <label>User Name</label>
      <input type="text" id="username" placeholder="Enter username">
    </div>

    <div class="input-box">
      <label>Mobile Number</label>
      <input type="text" id="mobile" placeholder="Enter mobile number">
    </div>

    <div class="input-box">
      <label>Location</label>
      <input type="text" id="location" placeholder="Enter location">
    </div>

    <div class="input-box">
      <label>Address</label>
      <textarea id="address" placeholder="Enter address"></textarea>
    </div>

    <div class="input-box">
      <label>Details</label>
      <textarea id="details" placeholder="Enter details"></textarea>
    </div>

    <div class="input-box">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>

    <button onclick="signup()">Create Account</button>

    <div id="message"></div>

  </div>

  <script>

    // ====================================
    // SUPABASE URL & ANON KEY
    // ====================================

    const SUPABASE_URL =
      "https://ipudyahkijaofyuhzdtv.supabase.co";

    const SUPABASE_ANON_KEY =
      "sb_publishable_sEOEdQLjc99aRtQPVEPDTQ_PczbVtB3";

    // ====================================

    const client = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    async function signup(){

      const name = document.getElementById("name").value;
      const username = document.getElementById("username").value;
      const mobile = document.getElementById("mobile").value;
      const location = document.getElementById("location").value;
      const address = document.getElementById("address").value;
      const details = document.getElementById("details").value;
      const password = document.getElementById("password").value;

      // Validation
      if(
        name === "" ||
        username === "" ||
        mobile === "" ||
        location === "" ||
        address === "" ||
        details === "" ||
        password === ""
      ){
        alert("Please fill all fields");
        return;
      }

      if(mobile.length !== 10){
        alert("Enter valid 10 digit mobile number");
        return;
      }

      // Insert data into users table
      const { data, error } = await client
        .from("users")
        .insert([
          {
            name: name,
            username: username,
            mobile: mobile,
            location: location,
            address: address,
            details: details,
            password: password
          }
        ]);

      if(error){

        document.getElementById("message").innerHTML =
          error.message;

        document.getElementById("message").style.color = "red";

      } else {

        document.getElementById("message").innerHTML =
          "Signup Successful!";

        document.getElementById("message").style.color = "green";

        // Clear Form
        document.getElementById("name").value = "";
        document.getElementById("username").value = "";
        document.getElementById("mobile").value = "";
        document.getElementById("location").value = "";
        document.getElementById("address").value = "";
        document.getElementById("details").value = "";
        document.getElementById("password").value = "";
      }
    }

  </script>

</body>
</html>
