<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewellery Store</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#4b0082,#6a0dad,#8a2be2);
    min-height:100vh;
    overflow-x:hidden;
}

/* NAVBAR */
.navbar{
    width:100%;
    padding:15px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
}

.nav-top{
    display:flex;
    align-items:center;
    gap:12px;
}

.search-box{
    position:relative;
    width:75%;
}

.search-box input{
    width:100%;
    padding:14px 45px 14px 18px;
    border:none;
    outline:none;
    border-radius:35px;
    background:white;
    font-size:16px;
}

.search-box i{
    position:absolute;
    right:16px;
    top:50%;
    transform:translateY(-50%);
    color:#777;
}

.profile{
    width:52px;
    height:52px;
    border-radius:50%;
    overflow:hidden;
    background:white;
    flex-shrink:0;
    cursor:pointer;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* LOCATION TEXT */
.location-text{
    margin-top:10px;
    display:flex;
    align-items:center;
    gap:8px;
    color:white;
    font-size:14px;
}

/* ================= CATEGORY SWIPE ================= */
.category-wrapper{
    margin-top:15px;
    overflow-x:auto;
    display:flex;
    gap:12px;
    padding:10px;
    scrollbar-width:none;
}

.category-wrapper::-webkit-scrollbar{
    display:none;
}

.category-card{
    flex:0 0 auto;
    width:85px;
    height:105px;
    background:black;
    border:2px solid #d4af37;
    border-radius:14px;
    text-align:center;
    color:white;
    padding:6px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
}

.category-card img{
    width:70px;
    height:60px;
    object-fit:cover;
    border-radius:10px;
}

.category-card p{
    font-size:11px;
    font-weight:bold;
}

/* ================= ADS ================= */
.ads-wrapper{
    margin-top:25px;
    overflow:hidden;
    width:100%;
}

.ads-track{
    display:flex;
    gap:15px;
    width:max-content;
    animation:adsMove 16s linear infinite;
}

.ads-card{
    min-width:280px;
    height:200px;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    flex-shrink:0;
}

.ads-card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.ads-name{
    position:absolute;
    bottom:0;
    width:100%;
    padding:10px;
    background:rgba(0,0,0,0.5);
    color:white;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

@keyframes adsMove{
    0%{ transform:translateX(0); }
    100%{ transform:translateX(-50%); }
}

/* ================= LOCATION POPUP ================= */
.popup{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:white;
    padding:20px;
    border-radius:20px 20px 0 0;
    box-shadow:0 -5px 20px rgba(0,0,0,0.3);
    text-align:center;
    z-index:9999;
}

.popup button{
    margin:6px;
    padding:10px 14px;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

.btn1{ background:#6a0dad; }
.btn2{ background:#4b0082; }
.btn3{ background:#999; }

</style>
</head>

<body>

<div class="navbar">

    <div class="nav-top">

        <div class="search-box">
            <input type="text" placeholder="Search...">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <div class="profile">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
        </div>

    </div>

    <div class="location-text">
        <i class="fa-solid fa-location-dot"></i>
        <span id="locationText">Detecting location...</span>
    </div>

</div>

<!-- CATEGORY -->
<div class="category-wrapper">

    <div class="category-card"><img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638"><p>Necklace</p></div>
    <div class="category-card"><img src="https://images.unsplash.com/photo-1603974372039-adc49044b6bd"><p>Chain</p></div>
    <div class="category-card"><img src="https://images.unsplash.com/photo-1635767798638-3e25273a8236"><p>Choker</p></div>
    <div class="category-card"><img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d"><p>Pendant</p></div>
    <div class="category-card"><img src="https://images.unsplash.com/photo-1630019852942-f89202989a59"><p>Earrings</p></div>
    <div class="category-card"><img src="https://images.pexels.com/photos/9428788/pexels-photo-9428788.jpeg"><p>Jhumkas</p></div>
    <div class="category-card"><img src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338"><p>Studs</p></div>
    <div class="category-card"><img src="https://images.pexels.com/photos/10983783/pexels-photo-10983783.jpeg"><p>Hoops</p></div>

</div>

<!-- ADS -->
<div class="ads-wrapper">
    <div class="ads-track">

        <div class="ads-card">
            <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
            <div class="ads-name">Necklace</div>
        </div>

        <div class="ads-card">
            <img src="https://images.unsplash.com/photo-1603974372039-adc49044b6bd">
            <div class="ads-name">Chain</div>
        </div>

        <div class="ads-card">
            <img src="https://images.unsplash.com/photo-1635767798638-3e25273a8236">
            <div class="ads-name">Choker</div>
        </div>

        <div class="ads-card">
            <img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d">
            <div class="ads-name">Pendant</div>
        </div>

    </div>
</div>

<!-- LOCATION SCRIPT -->
<script>

const locationText = document.getElementById("locationText");

function setText(msg){
    locationText.innerText = msg;
}

function requestLocation(){

    if(!navigator.geolocation){
        setText("Location not supported");
        return;
    }

    navigator.geolocation.getCurrentPosition(

        async (pos)=>{

            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;

            try{
                let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                let data = await res.json();

                let addr = data.address;

                let place = addr.city || addr.town || addr.village || addr.state || "Your area";

                setText("📍 " + place + ", India");
            }
            catch{
                setText("📍 Location found but name unavailable");
            }

        },

        ()=>{
            showPopup();
        },

        {
            enableHighAccuracy:true,
            timeout:10000
        }
    );
}

/* POPUP */
function showPopup(){

    let div = document.createElement("div");
    div.className = "popup";

    div.innerHTML = `
        <h3>📍 Allow Location Access</h3>
        <p>We need location for nearby jewellery offers</p>

        <button class="btn1" onclick="retry()">Allow This Time</button>
        <button class="btn2" onclick="guide()">Allow Always</button>
        <button class="btn3" onclick="deny()">Deny</button>
    `;

    document.body.appendChild(div);
}

function retry(){
    document.querySelector(".popup").remove();
    requestLocation();
}

function guide(){
    alert("Go to browser settings → Site permissions → Allow Location");
}

function deny(){
    document.querySelector(".popup").remove();
    setText("📍 Location disabled");
}

window.onload = requestLocation;

</script>

</body>
</html>
