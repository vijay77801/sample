<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewellery Store</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#4b0082,#6a0dad,#8a2be2);
    min-height:100vh;
    overflow-x:hidden;
}

/* NAVBAR */
.navbar{
    width:100%;
    padding:15px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
}

.nav-top{
    display:flex;
    align-items:center;
    gap:12px;
}

/* SEARCH */
.search-box{
    position:relative;
    width:75%;
}

.search-box input{
    width:100%;
    padding:14px 45px 14px 18px;
    border:none;
    outline:none;
    border-radius:35px;
    background:white;
    font-size:16px;
}

.search-box i{
    position:absolute;
    right:16px;
    top:50%;
    transform:translateY(-50%);
    color:#777;
}

/* PROFILE ICON (RESTORED) */
.profile{
    width:52px;
    height:52px;
    border-radius:50%;
    overflow:hidden;
    background:white;
    flex-shrink:0;
    cursor:pointer;
    border:2px solid #fff;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* LOCATION */
.location-text{
    margin-top:10px;
    display:flex;
    align-items:center;
    gap:8px;
    color:white;
    font-size:14px;
}

/* ================= CATEGORY ================= */
.category-wrapper{
    margin-top:15px;
    display:flex;
    gap:12px;
    overflow-x:auto;
    padding:10px;
    scroll-snap-type:x mandatory;
}

.category-wrapper::-webkit-scrollbar{
    display:none;
}

.category-card{
    flex:0 0 auto;
    width:95px;
    height:120px;
    background:black;
    border:2px solid #d4af37;
    border-radius:14px;
    text-align:center;
    color:white;
    padding:6px;
    scroll-snap-align:start;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
}

.category-card img{
    width:75px;
    height:70px;
    object-fit:cover;
    border-radius:10px;
}

.category-card p{
    font-size:12px;
    font-weight:bold;
}

/* ================= ADS ================= */
.ads-wrapper{
    margin-top:25px;
    overflow:hidden;
    width:100%;
}

.ads-track{
    display:flex;
    width:max-content;
    gap:15px;
    animation:adsMove 18s linear infinite;
}

.ads-card{
    min-width:300px;
    height:210px;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    flex-shrink:0;
}

.ads-card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.ads-name{
    position:absolute;
    bottom:0;
    width:100%;
    padding:10px;
    background:rgba(0,0,0,0.5);
    color:white;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

@keyframes adsMove{
    0%{ transform:translateX(0); }
    100%{ transform:translateX(-50%); }
}

/* PROFILE CARD (RESTORED) */
.profile-card{
    position:absolute;
    top:85px;
    right:15px;
    width:300px;
    background:white;
    border-radius:20px;
    padding:20px;
    display:none;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    z-index:999;
}

.profile-top{
    text-align:center;
    margin-bottom:15px;
}

.profile-top img{
    width:80px;
    height:80px;
    border-radius:50%;
}

.info-box{
    background:#f5ecff;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

.info-box span{
    display:block;
    font-weight:bold;
    color:#6a0dad;
    font-size:13px;
}

</style>
</head>

<body>

<div class="navbar">

    <div class="nav-top">

        <div class="search-box">
            <input type="text" placeholder="Search jewellery...">
        </div>

        <!-- PROFILE ICON (FIXED) -->
        <div class="profile" onclick="toggleProfile()">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
        </div>

    </div>

    <div class="location-text">
        <i class="fa-solid fa-location-dot"></i>
        <span id="locationText">Detecting location...</span>
    </div>

</div>

<!-- CATEGORY -->
<div class="category-wrapper">

    <div class="category-card"><img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638"><p>Necklace</p></div>
    <div class="category-card"><img src="https://images.unsplash.com/photo-1603974372039-adc49044b6bd"><p>Chain</p></div>
    <div class="category-card"><img src="https://images.unsplash.com/photo-1635767798638-3e25273a8236"><p>Choker</p></div>
    <div class="category-card"><img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d"><p>Pendant</p></div>
    <div class="category-card"><img src="https://images.unsplash.com/photo-1630019852942-f89202989a59"><p>Earrings</p></div>
    <div class="category-card"><img src="https://images.pexels.com/photos/9428788/pexels-photo-9428788.jpeg"><p>Jhumkas</p></div>
    <div class="category-card"><img src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338"><p>Studs</p></div>
    <div class="category-card"><img src="https://images.pexels.com/photos/10983783/pexels-photo-10983783.jpeg"><p>Hoops</p></div>

</div>

<!-- ADS -->
<div class="ads-wrapper">
    <div class="ads-track">

        <div class="ads-card">
            <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
            <div class="ads-name">Necklace</div>
        </div>

        <div class="ads-card">
            <img src="https://images.unsplash.com/photo-1603974372039-adc49044b6bd">
            <div class="ads-name">Chain</div>
        </div>

        <div class="ads-card">
            <img src="https://images.unsplash.com/photo-1635767798638-3e25273a8236">
            <div class="ads-name">Choker</div>
        </div>

        <div class="ads-card">
            <img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d">
            <div class="ads-name">Pendant</div>
        </div>

    </div>
</div>

<!-- PROFILE CARD -->
<div class="profile-card" id="profileCard">

    <div class="profile-top">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
        <h3>Vijay</h3>
    </div>

    <div class="info-box">
        <span>Phone</span>
        <p>+91 9876543210</p>
    </div>

    <div class="info-box">
        <span>Email</span>
        <p>vijay@email.com</p>
    </div>

    <div class="info-box">
        <span>Address</span>
        <p>Sajjapuram, Andhra Pradesh</p>
    </div>

</div>

<script>

/* PROFILE TOGGLE */
function toggleProfile(){
    let card=document.getElementById("profileCard");
    card.style.display = card.style.display==="block" ? "none" : "block";
}

/* LOCATION */
const text=document.getElementById("locationText");

function set(msg){
    text.innerText=msg;
}

function getLocation(){

    if(!navigator.geolocation){
        set("Location not supported");
        return;
    }

    set("Detecting location...");

    navigator.geolocation.getCurrentPosition(

        async (pos)=>{

            let lat=pos.coords.latitude;
            let lon=pos.coords.longitude;

            try{
                let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                let data=await res.json();

                let addr=data.address||{};

                let place=
                    addr.village||
                    addr.town||
                    addr.suburb||
                    addr.city||
                    addr.district||
                    addr.state||
                    "Your area";

                set("📍 "+place+", India");

            }catch(e){
                set("📍 Location found");
            }

        },

        ()=>{
            set("📍 Allow location permission");
        },

        {
            enableHighAccuracy:true,
            timeout:12000
        }
    );
}

window.onload=getLocation;

</script>

</body>
</html>
