<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cezo Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f2f2f2;
    overflow-x:hidden;
}

/* Splash Screen */

.splash{
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:1000;
    animation:hideSplash 1s forwards;
    animation-delay:3s;
}

.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#ff9800;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:45px;
    font-weight:bold;
    animation:zoom 2s infinite;
}

.name{
    color:white;
    font-size:34px;
    margin-top:20px;
}

.loading{
    width:220px;
    height:8px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
    margin-top:20px;
}

.loading span{
    display:block;
    width:0%;
    height:100%;
    background:#ff9800;
    animation:load 3s linear forwards;
}

/* Main Page */

.main{
    display:none;
    padding:15px;
}

.header{
    background:black;
    color:white;
    padding:18px;
    border-radius:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

#reader{
    width:100%;
    margin-top:20px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    padding:10px;
}

.scan-btn{
    width:100%;
    padding:15px;
    border:none;
    background:#ff9800;
    color:white;
    border-radius:12px;
    font-size:20px;
    margin-top:15px;
}

.status{
    text-align:center;
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}

.card{
    background:white;
    margin-top:20px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:180px;
    object-fit:contain;
}

.card h2{
    margin-top:10px;
}

.card p{
    margin-top:8px;
    font-size:18px;
}

.total{
    margin-top:20px;
    background:green;
    color:white;
    padding:18px;
    border-radius:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

/* Animation */

@keyframes zoom{

    50%{
        transform:scale(1.2);
    }

}

@keyframes load{

    100%{
        width:100%;
    }

}

@keyframes hideSplash{

    to{
        opacity:0;
        visibility:hidden;
    }

}

</style>
</head>
<body>

<!-- Splash -->

<div class="splash">

    <div class="logo">
        C
    </div>

    <div class="name">
        CEZO SCANNER
    </div>

    <div class="loading">
        <span></span>
    </div>

</div>

<!-- Main -->

<div class="main" id="main">

    <div class="header">
        CEZO SCANNER
    </div>

    <div id="reader"></div>

    <button class="scan-btn" onclick="startScanner()">
        Open Back Camera Scanner
    </button>

    <div class="status" id="status">
        Click Camera To Scan Products
    </div>

    <div id="products"></div>

    <div class="total">
        Grand Total : ₹ <span id="grand">0</span>
    </div>

</div>

<script>

/* Splash */

setTimeout(function(){

    document.getElementById("main").style.display = "block";

},3000);

/* Variables */

let total = 0;
let scanned = [];
let scannerStarted = false;
let html5QrCode;

/* Product Search */

async function getProduct(code){

    document.getElementById("status").innerHTML =
    "Searching Product...";

    try{

        let response =
        await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);

        let data =
        await response.json();

        if(data.status == 1){

            let product =
            data.product.product_name ||
            "Super Market Product";

            let image =
            data.product.image_front_small_url ||
            "https://via.placeholder.com/200";

            let quantity = 1;

            /* Demo Price */

            let price =
            Math.floor(Math.random()*500)+20;

            let final =
            quantity * price;

            total += final;

            document.getElementById("grand").innerHTML =
            total;

            document.getElementById("products").innerHTML += `

            <div class="card">

                <img src="${image}">

                <h2>${product}</h2>

                <p><b>Barcode :</b> ${code}</p>

                <p><b>Price :</b> ₹ ${price}</p>

                <p><b>Quantity :</b> ${quantity}</p>

                <p><b>Total :</b> ₹ ${final}</p>

            </div>

            `;

            document.getElementById("status").innerHTML =
            product + " Added Successfully";

        }else{

            document.getElementById("status").innerHTML =
            "Product Not Found";

        }

    }catch(error){

        document.getElementById("status").innerHTML =
        "Internet Error";

    }

}

/* Start Scanner */

async function startScanner(){

    if(scannerStarted){
        return;
    }

    scannerStarted = true;

    html5QrCode =
    new Html5Qrcode("reader");

    try{

        await html5QrCode.start(

            {
                facingMode:"environment"
            },

            {
                fps:10,
                qrbox:250
            },

            async function(code){

                if(scanned.includes(code)){
                    return;
                }

                scanned.push(code);

                getProduct(code);

            }

        );

    }catch(error){

        document.getElementById("status").innerHTML =
        "Please Allow Camera Permission";

    }

}

</script>

</body>
</html>
