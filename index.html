<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup Page</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
  width:90%;
  max-width:380px;
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h2{
  text-align:center;
  margin-bottom:20px;
  color:#333;
}

input{
  width:100%;
  padding:13px;
  margin:8px 0;
  border-radius:12px;
  border:1px solid #ddd;
  outline:none;
  font-size:12px;
}

input:focus{
  border-color:#4facfe;
}

button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:#4facfe;
  color:white;
  font-size:12px;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

button:hover{
  background:#007bff;
}

.divider{
  text-align:center;
  margin:18px 0;
  color:#888;
  font-size:12px;
  position:relative;
}

.divider::before,
.divider::after{
  content:"";
  position:absolute;
  width:35%;
  height:1px;
  background:#ddd;
  top:50%;
}

.divider::before{
  left:0;
}

.divider::after{
  right:0;
}

.social-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:#fff;
  color:#333;
  border:1px solid #ddd;
  margin-top:10px;
}

.social-btn img{
  width:22px;
  height:22px;
}

.msg{
  text-align:center;
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

  <h2>Create Account</h2>

  <input type="text" id="name" placeholder="Full Name">
  <input type="text" id="mobile" placeholder="Mobile Number">
  <input type="password" id="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>

  <div class="divider">OR</div>

  <!-- GOOGLE -->
  <button class="social-btn" onclick="googleLogin()">
    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
    Continue with Google
  </button>

  <!-- FACEBOOK -->
  <button class="social-btn" onclick="facebookLogin()">
    <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png">
    Continue with Facebook
  </button>

  <div class="msg" id="msg"></div>

</div>

<script>
const SUPABASE_URL = "https://fconiqhkfsoexqbieydq.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_wVA-NALwoRLpqXiWhrPcTw_m584IYRD";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

// NORMAL SIGNUP
async function signup(){

  const name = document.getElementById("name").value;
  const mobile = document.getElementById("mobile").value;
  const password = document.getElementById("password").value;

  const msg = document.getElementById("msg");

  if(!name || !mobile || !password){
    msg.style.color="red";
    msg.innerText="Please fill all fields";
    return;
  }

  const { error } = await supabaseClient
    .from("users")
    .insert([
      {
        name:name,
        mobile_number:mobile,
        password:password,
        provider:"manual"
      }
    ]);

  if(error){
    msg.style.color="red";
    msg.innerText=error.message;
  }else{
    msg.style.color="green";
    msg.innerText="Signup successful!";
  }
}

// GOOGLE LOGIN
async function googleLogin(){

  await supabaseClient.auth.signInWithOAuth({
    provider: 'google',
    options:{
      redirectTo: window.location.href
    }
  });

}

// FACEBOOK LOGIN
async function facebookLogin(){

  await supabaseClient.auth.signInWithOAuth({
    provider: 'facebook',
    options:{
      redirectTo: window.location.href
    }
  });

}

// SAVE SOCIAL USER DATA
async function saveUser(){

  const { data:{user} } = await supabaseClient.auth.getUser();

  if(user){

    await supabaseClient
      .from("users")
      .upsert([
        {
          email:user.email,
          name:user.user_metadata.full_name,
          provider:user.app_metadata.provider
        }
      ]);

    document.getElementById("msg").style.color="green";
    document.getElementById("msg").innerText =
      "Logged in as " + user.email;
  }

}

saveUser();
</script>

</body>
</html>
