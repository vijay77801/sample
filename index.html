# Mobile Billing Webpage with Barcode Scanner

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cezo Scanner</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f4f6;
    padding:15px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    background:#ffcc00;
    padding:18px;
    border-radius:15px;
    text-align:center;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.header h1{
    color:#222;
    font-size:32px;
}

.scanner-box{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

#scanner{
    width:100%;
    height:320px;
    border-radius:12px;
    overflow:hidden;
    border:3px solid #ffcc00;
}

.scan-btn{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    background:#222;
    color:white;
    font-size:18px;
    border-radius:12px;
    cursor:pointer;
}

.scan-btn:hover{
    background:#000;
}

.bill-box{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.customer-box{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.customer-box input{
    flex:1;
    min-width:250px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

.table-box{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#222;
    color:white;
    padding:14px;
}

table td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

.total-box{
    margin-top:20px;
    text-align:right;
}

.total-box h2{
    color:#111;
    margin-bottom:15px;
}

.print-btn{
    background:#28a745;
    color:white;
    border:none;
    padding:14px 25px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

.print-btn:hover{
    background:#218838;
}

.status{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
    color:#333;
}

@media(max-width:768px){

    .header h1{
        font-size:24px;
    }

    #scanner{
        height:250px;
    }

    table{
        font-size:13px;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1><i class="fa-solid fa-cart-shopping"></i> Cezo Scanner</h1>
    </div>

    <div class="scanner-box">

        <div id="scanner"></div>

        <button class="scan-btn" onclick="startScanner()">
            <i class="fa-solid fa-camera"></i> Open Camera & Scan Product
        </button>

        <div class="status" id="status">
            Click button to start scanning
        </div>

    </div>

    <div class="bill-box">

        <div class="customer-box">
            <input type="text" placeholder="Customer Name">
            <input type="number" placeholder="Phone Number">
            <input type="text" value="BILL1001">
        </div>

        <div class="table-box">

            <table id="billTable">

                <tr>
                    <th>Barcode</th>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Total</th>
                </tr>

            </table>

        </div>

        <div class="total-box">
            <h2>Grand Total : ₹ <span id="grandTotal">0</span></h2>

            <button class="print-btn" onclick="window.print()">
                <i class="fa-solid fa-print"></i> Print Bill
            </button>
        </div>

    </div>

</div>

<script>

let scannedCodes = [];

const products = {

    "8901030895484": {
        name: "Coca Cola 750ml",
        price: 45
    },

    "8901491101198": {
        name: "Maggi Noodles",
        price: 14
    },

    "8906009459621": {
        name: "Dairy Milk Chocolate",
        price: 40
    },

    "8901063162362": {
        name: "Parle-G Biscuits",
        price: 10
    },

    "8902519012330": {
        name: "Surf Excel Soap",
        price: 38
    },

    "8902080035684": {
        name: "Aashirvaad Atta",
        price: 320
    }

};

function startScanner(){

    document.getElementById("status").innerHTML = "Opening Camera...";

    Quagga.init({

        inputStream : {
            name : "Live",
            type : "LiveStream",
            target: document.querySelector('#scanner'),
            constraints: {
                facingMode: "environment"
            }
        },

        decoder : {
            readers : [
                "ean_reader",
                "ean_8_reader",
                "code_128_reader"
            ]
        }

    }, function(err) {

        if (err) {
            console.log(err);
            alert("Camera not working. Please allow camera permission.");
            return;
        }

        Quagga.start();

        document.getElementById("status").innerHTML = "Scanner Started - Scan Product Barcode";

    });

}

Quagga.onDetected(function(data){

    let code = data.codeResult.code;

    if(scannedCodes.includes(code)){
        return;
    }

    scannedCodes.push(code);

    addProduct(code);

});

function addProduct(code){

    let table = document.getElementById("billTable");

    let product = products[code];

    if(product){

        let row = table.insertRow();

        let total = product.price * 1;

        row.innerHTML = `

            <td>${code}</td>
            <td>${product.name}</td>
            <td>₹ ${product.price}</td>
            <td>1</td>
            <td class="rowTotal">₹ ${total}</td>

        `;

        calculateGrandTotal();

        document.getElementById("status").innerHTML = product.name + " Added Successfully";

    }else{

        let row = table.insertRow();

        row.innerHTML = `

            <td>${code}</td>
            <td>Product Not Found</td>
            <td>₹ 0</td>
            <td>1</td>
            <td class="rowTotal">₹ 0</td>

        `;

        document.getElementById("status").innerHTML = "Unknown Product Barcode";

    }

}

function calculateGrandTotal(){

    let totals = document.querySelectorAll('.rowTotal');

    let grand = 0;

    totals.forEach(function(item){

        let value = item.innerText.replace('₹','').trim();

        grand += Number(value);

    });

    document.getElementById("grandTotal").innerHTML = grand;

}

</script>

</body>
</html>
