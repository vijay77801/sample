<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajjaram Brass</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}

/* =========================
   SPLASH SCREEN
========================= */
#splash {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at center, #1a1a1a, #000);
}

/* LOGO BOX */
.logo-box {
  text-align: center;
  position: relative;
}

/* LOGO IMAGE */
.logo-box img {
  width: 180px;
  max-width: 60vw;
  opacity: 0;
  transform: scale(0.5) rotate(-10deg);
  filter: drop-shadow(0 0 25px gold);
  animation: logoIn 2.5s ease forwards;
}

/* GOLD SWEEP */
.logo-box::before {
  content: "";
  position: absolute;
  top: 0;
  left: -150%;
  width: 120%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255, 215, 0, 0.6),
    transparent
  );
  transform: skewX(-20deg);
  animation: shine 2.2s ease forwards;
}

/* GLOW BURST */
.logo-box::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, rgba(255,215,0,0.35), transparent 60%);
  opacity: 0;
  animation: glowPulse 2s ease forwards;
}

/* TEXT */
.logo-text {
  margin-top: 15px;
  color: gold;
  font-size: 16px;
  letter-spacing: 4px;
  opacity: 0;
  animation: textIn 2.5s ease forwards;
}

/* EXIT */
.fade-out {
  opacity: 0;
  transition: 0.8s ease;
}

/* =========================
   MAIN PAGE
========================= */
#main {
  display: none;
  padding: 20px;
  background: #fff;
  min-height: 100vh;
}

/* =========================
   ANIMATIONS
========================= */

@keyframes logoIn {
  0% {
    opacity: 0;
    transform: scale(0.4) rotate(-15deg);
    filter: blur(10px);
  }
  60% {
    opacity: 1;
    transform: scale(1.1) rotate(4deg);
    filter: blur(0);
  }
  100% {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }
}

@keyframes shine {
  0% { left: -150%; }
  100% { left: 150%; }
}

@keyframes glowPulse {
  0% { opacity: 0; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(1.4); }
}

@keyframes textIn {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

</style>
</head>

<body>

<!-- =========================
     SPLASH SCREEN
========================= -->
<div id="splash">
  <div class="logo-box">
    <img src="ajjaram.png" alt="Ajjaram Brass Logo">
    <div class="logo-text"></div>
  </div>
</div>

<!-- =========================
     MAIN PAGE
========================= -->
<div id="main">
  <h1>Welcome to Ajjaram Brass</h1>
  <p>Your website starts here...</p>
</div>

<script>
setTimeout(() => {
  document.getElementById("splash").classList.add("fade-out");

  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("main").style.display = "block";
  }, 800);

}, 3000);
</script>

</body>
</html>
