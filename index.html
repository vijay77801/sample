<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Love Signup Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  overflow:hidden;
}

.container{
  width:90%;
  max-width:380px;
  background:white;
  border-radius:25px;
  padding:28px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.heart{
  text-align:center;
  font-size:60px;
  margin-bottom:10px;
}

.title{
  text-align:center;
  font-size:28px;
  color:#ff4d6d;
  font-weight:bold;
}

.subtitle{
  text-align:center;
  color:#777;
  margin-top:5px;
  margin-bottom:22px;
}

input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #ddd;
  margin-bottom:14px;
  outline:none;
  font-size:15px;
}

input:focus{
  border-color:#ff4d6d;
  box-shadow:0 0 0 4px rgba(255,77,109,0.15);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#ff4d6d;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
  font-weight:bold;
}

button:hover{
  background:#ff1e4d;
}

.switch{
  text-align:center;
  margin-top:18px;
  color:#666;
  font-size:14px;
}

.switch span{
  color:#ff4d6d;
  font-weight:bold;
  cursor:pointer;
}

.msg{
  text-align:center;
  margin-top:12px;
  font-size:14px;
  min-height:20px;
}

#loginPage{
  display:none;
}

</style>
</head>

<body>

<div class="container">

  <!-- SIGNUP -->
  <div id="signupPage">

    <div class="heart">💖</div>

    <div class="title">
      Love Signup
    </div>

    <div class="subtitle">
      Create your love account
    </div>

    <input
    type="text"
    id="loverName"
    placeholder="Lover Name">

    <input
    type="text"
    id="boyfriendName"
    placeholder="Boyfriend Name">

    <input
    type="password"
    id="signupPassword"
    placeholder="Password">

    <button onclick="signup()">
      Sign Up
    </button>

    <div class="switch">
      Already have an account?
      <span onclick="showLogin()">
        Login
      </span>
    </div>

    <div class="msg" id="signupMsg"></div>

  </div>

  <!-- LOGIN -->
  <div id="loginPage">

    <div class="heart">💕</div>

    <div class="title">
      Love Login
    </div>

    <div class="subtitle">
      Welcome back lovers
    </div>

    <input
    type="text"
    id="loginLover"
    placeholder="Lover Name">

    <input
    type="password"
    id="loginPassword"
    placeholder="Password">

    <button onclick="login()">
      Login
    </button>

    <div class="switch">
      Create new account?
      <span onclick="showSignup()">
        Sign Up
      </span>
    </div>

    <div class="msg" id="loginMsg"></div>

  </div>

</div>

<script>

/* SUPABASE */

const SUPABASE_URL =
"https://fconiqhkfsoexqbieydq.supabase.co";

const SUPABASE_ANON_KEY =
"sb_publishable_wVA-NALwoRLpqXiWhrPcTw_m584IYRD";

const supabaseClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

/* PAGE SWITCH */

function showLogin(){

  document.getElementById("signupPage")
  .style.display="none";

  document.getElementById("loginPage")
  .style.display="block";
}

function showSignup(){

  document.getElementById("loginPage")
  .style.display="none";

  document.getElementById("signupPage")
  .style.display="block";
}

/* SIGNUP */

async function signup(){

  const loverName =
  document.getElementById("loverName")
  .value.trim();

  const boyfriendName =
  document.getElementById("boyfriendName")
  .value.trim();

  const password =
  document.getElementById("signupPassword")
  .value.trim();

  const msg =
  document.getElementById("signupMsg");

  msg.innerText = "";

  if(
    !loverName ||
    !boyfriendName ||
    !password
  ){

    msg.style.color="red";

    msg.innerText=
    "Please fill all fields";

    return;
  }

  const { data,error } =
  await supabaseClient
  .from("lovers")
  .insert([
    {
      lover_name:loverName,
      boyfriend_name:boyfriendName,
      password:password
    }
  ])
  .select();

  if(error){

    console.log(error);

    msg.style.color="red";

    msg.innerText=
    error.message;

  }else{

    console.log(data);

    msg.style.color="green";

    msg.innerText=
    "Signup successful 💖";

    // CLEAR INPUTS
    document.getElementById("loverName")
    .value="";

    document.getElementById("boyfriendName")
    .value="";

    document.getElementById("signupPassword")
    .value="";

    // GO LOGIN
    setTimeout(()=>{
      showLogin();
    },1500);

  }

}

/* LOGIN */

async function login(){

  const lover =
  document.getElementById("loginLover")
  .value.trim();

  const password =
  document.getElementById("loginPassword")
  .value.trim();

  const msg =
  document.getElementById("loginMsg");

  const { data,error } =
  await supabaseClient
  .from("lovers")
  .select("*")
  .eq("lover_name",lover)
  .eq("password",password)
  .single();

  if(error || !data){

    msg.style.color="red";

    msg.innerText=
    "Invalid lover name or password";

  }else{

    msg.style.color="green";

    msg.innerText=
    "Login successful 💕";

    localStorage.setItem(
      "loverUser",
      JSON.stringify(data)
    );

  }

}

</script>

</body>
</html>
