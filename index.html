# Cezo Scanner - Simple HTML Mobile Scanner

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cezo Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f3f6;
    padding:15px;
}

.header{
    width:100%;
    background:#111;
    color:white;
    text-align:center;
    padding:18px;
    border-radius:15px;
    font-size:30px;
    font-weight:bold;
    margin-bottom:20px;
}

#reader{
    width:100%;
    background:white;
    padding:10px;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#ff9800;
    color:white;
    font-size:20px;
    cursor:pointer;
}

button:hover{
    background:#e68900;
}

.products{
    margin-top:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:180px;
    object-fit:contain;
    margin-top:10px;
}

.card h2{
    color:#111;
    margin-bottom:10px;
}

.card p{
    font-size:18px;
    margin-bottom:8px;
    color:#333;
}

.total{
    margin-top:20px;
    background:#28a745;
    color:white;
    padding:18px;
    border-radius:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.status{
    margin-top:15px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    color:#222;
}

@media(max-width:768px){

    .header{
        font-size:24px;
    }

    .card p{
        font-size:16px;
    }

}

</style>
</head>
<body>

<div class="header">
CEZO SCANNER
</div>

<div id="reader"></div>

<button onclick="startScanner()">
Open Camera Scanner
</button>

<div class="status" id="status">
Click button to scan products
</div>

<div class="products" id="products"></div>

<div class="total">
Grand Total : ₹ <span id="grand">0</span>
</div>

<script>

let grandTotal = 0;
let scannedProducts = [];
let scannerStarted = false;

function startScanner(){

    if(scannerStarted){
        return;
    }

    scannerStarted = true;

    const scanner = new Html5QrcodeScanner(
        "reader",
        {
            fps:10,
            qrbox:250
        }
    );

    scanner.render(onScanSuccess);

    document.getElementById("status").innerHTML = "Camera Opened - Scan Product Barcode";

}

async function onScanSuccess(barcode){

    if(scannedProducts.includes(barcode)){
        return;
    }

    scannedProducts.push(barcode);

    document.getElementById("status").innerHTML = "Searching Product...";

    try{

        let response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);

        let data = await response.json();

        if(data.status === 1){

            let productName = data.product.product_name || "Super Market Product";

            let image = data.product.image_front_small_url || "https://via.placeholder.com/200";

            let price = Math.floor(Math.random() * 500) + 20;

            grandTotal += price;

            document.getElementById("grand").innerHTML = grandTotal;

            document.getElementById("products").innerHTML += `

            <div class="card">
                <h2>${productName}</h2>
                <p><b>Barcode :</b> ${barcode}</p>
                <p><b>Price :</b> ₹ ${price}</p>
                <img src="${image}">
            </div>

            `;

            document.getElementById("status").innerHTML = productName + " Added Successfully";

        }else{

            document.getElementById("status").innerHTML = "Product Not Found";

        }

    }catch(error){

        document.getElementById("status").innerHTML = "Internet or Camera Error";

    }

}

</script>

</body>
</html>
